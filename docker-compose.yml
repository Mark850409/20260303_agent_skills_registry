services:
  api:
    build:
      context: ./packages/registry-api
      dockerfile: Dockerfile
    ports:
      - "5006:5006"
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://registry_user:registry_password@db:5432/registry_db
    volumes:
      - ./packages/registry-api:/app
      - ./packages/cli:/cli
      - ./data/registry:/var/lib/registry
    command: >
      sh -c "if [ -d '/cli' ]; then pip install -e /cli; fi && python wsgi.py"
    networks:
      - agentskills-network
    depends_on:
      - registry
      - db

  registry:
    image: registry:2
    expose:
      - "5000"
    environment:
      - REGISTRY_AUTH=htpasswd
      - REGISTRY_AUTH_HTPASSWD_REALM=Registry Realm
      - REGISTRY_AUTH_HTPASSWD_PATH=/auth/htpasswd
      - REGISTRY_STORAGE_DELETE_ENABLED=true
    volumes:
      - ./data/registry:/var/lib/registry
      - ./auth:/auth
    networks:
      - agentskills-network

  nginx:
    image: nginx:alpine
    ports:
      - "5005:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - agentskills-network
    depends_on:
      - registry
      - api
      - verdaccio

  verdaccio:
    image: verdaccio/verdaccio:5
    expose:
      - "4873"
    environment:
      - VERDACCIO_PORT=4873
    volumes:
      - ./data/verdaccio/storage:/verdaccio/storage
      - ./data/verdaccio/conf:/verdaccio/conf
      - ./auth:/auth
    networks:
      - agentskills-network

  ui:
    build:
      context: ./packages/registry-ui
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://api:5006
    volumes:
      - ./packages/registry-ui:/app
      - /app/node_modules
    networks:
      - agentskills-network
    depends_on:
      - api

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=registry_user
      - POSTGRES_PASSWORD=registry_password
      - POSTGRES_DB=registry_db
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - agentskills-network
    ports:
      - "5435:5432"
    expose:
      - "5432"


networks:
  agentskills-network:
    driver: bridge

# 移除 volumes 定義，因為改用 bind mount


